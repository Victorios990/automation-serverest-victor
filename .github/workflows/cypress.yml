name: Cypress Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint e formatação
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx prettier --check .

  e2e-gui:
    name: Testes E2E (GUI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Executa specs de GUI
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/GUI/**/*.cy.js
      - name: Upload de screenshots (em caso de falha)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-gui
          path: cypress/screenshots
          if-no-files-found: ignore
      - name: Upload dos resultados do Allure (GUI)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-gui
          path: allure-results
          if-no-files-found: ignore

  api:
    name: Testes de API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Executa specs de API
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/API/**/*.cy.js
      - name: Upload de screenshots (em caso de falha)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-api
          path: cypress/screenshots
          if-no-files-found: ignore
      - name: Upload dos resultados do Allure (API)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results
          if-no-files-found: ignore

  allure-report:
    name: Relatório Allure
    runs-on: ubuntu-latest
    needs: [e2e-gui, api]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Baixa resultados de GUI
        uses: actions/download-artifact@v4
        with:
          name: allure-results-gui
          path: allure-results
      - name: Baixa resultados de API
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results
      - name: Gera o relatório HTML
        run: npm run allure:generate
      - name: Upload do relatório Allure
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: ignore
